<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Waterstof Storytelling</title>

<link rel="stylesheet" href="style.css">

<!-- Scrollama -->
<script src="https://unpkg.com/scrollama"></script>

</head>

<body>

<!-- LANDING LAYER -->
<div id="landing-layer">
  <div class="landing-content">
    <h1>Waterstof Storytelling</h1>
    <h2>Een introductie tot de wereld van waterstof</h2>
  </div>
</div>

<div id="container">

    <!-- BACKGROUND LAYER -->
    <div id="background-layer">

        <!-- Achtergronden (later foto's) -->

        <div class="bg-panel color1"></div>
        <div class="bg-panel color2"></div>
        <div class="bg-panel color3"></div>
        <div class="bg-panel color4"></div>
        <div class="bg-panel color5"></div>

        <!-- VIDEO ACHTERGROND -->
        <div class="bg-panel video-bg"></div>

        <div class="bg-panel color6"></div>
        <div class="bg-panel color7"></div>
        <div class="bg-panel color8"></div>
        <div class="bg-panel color9"></div>
        <div class="bg-panel color10"></div>
        <div class="bg-panel color11"></div>
        <div class="bg-panel color12"></div>
        <div class="bg-panel color13"></div>

    </div>


    <!-- FOREGROUND TEXT + VIDEO -->
    <div id="text-layer">

        <!-- BLOK 1 -->
        <div class="step left">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 1 -->
            </div>
        </div>

        <!-- BLOK 2 -->
        <div class="step right">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 2 -->
            </div>
        </div>

        <!-- BLOK 3 -->
        <div class="step left">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 3 -->
            </div>
        </div>

        <!-- BLOK 4 -->
        <div class="step right">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 4 -->
            </div>
        </div>

        <!-- BLOK 5 -->
        <div class="step left">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 5 -->
            </div>
        </div>


        <!-- VIDEO SECTIE -->
        <div class="step video-step">

            <div class="video-container">

                <video autoplay muted loop playsinline>

                    <!-- Zet hier je video -->
                    <source src="video/waterstof.mp4" type="video/mp4">

                </video>

            </div>

        </div>


        <!-- BLOK 6 -->
        <div class="step right">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 6 -->
            </div>
        </div>

        <!-- BLOK 7 -->
        <div class="step left">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 7 -->
            </div>
        </div>

        <!-- BLOK 8 -->
        <div class="step right">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 8 -->
            </div>
        </div>

        <!-- BLOK 9 -->
        <div class="step left">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 9 -->
            </div>
        </div>

        <!-- BLOK 10 -->
        <div class="step right">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 10 -->
            </div>
        </div>

        <!-- BLOK 11 -->
        <div class="step left">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 11 -->
            </div>
        </div>

        <!-- BLOK 12 -->
        <div class="step right">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 12 -->
            </div>
        </div>

        <!-- BLOK 13 -->
        <div class="step left">
            <div class="textbox">
            <!-- HIER KOMT TEKST BLOK 13 -->
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
